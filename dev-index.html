<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="seo-title">هادي الأحمد</title>
    <meta id="seo-description" name="description" content="وحياتي غير المثيرة للاهتمام">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page-container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <!-- Branding -->
            <div class="flex-col gap-4 items-start">
                <div class="site-branding" onclick="window.location.hash='#'">
                    <h1 id="site-title" class="site-title"></h1>
                    <span id="site-tagline" class="site-tagline"></span>
                </div>

                <!-- Control Toggles -->
                <div class="flex items-center gap-2">
                    <button id="toggle-minimal" title="الصور" class="btn-icon">
                        <i data-lucide="image" id="minimal-icon"></i>
                    </button>
                    <button id="toggle-text" title="كامل/بسيط" class="btn-icon">
                        <i data-lucide="file-text" id="text-icon"></i>
                    </button>
                    <button id="toggle-dark" title="الوضع الليلي" class="btn-icon">
                        <i data-lucide="moon" id="dark-icon"></i>
                    </button>
                    <a href="#settings" id="settings-btn" aria-label="الإعدادات" title="الإعدادات" class="btn-icon"
                        style="display: none;">
                        <i data-lucide="settings"></i>
                    </a>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1">
                <ul id="main-nav" class="nav-list">
                    <!-- Skeletons for main navigation -->
                    <li class="skeleton" style="height: 40px; width: 100%;"></li>
                    <li class="skeleton" style="height: 40px; width: 100%;"></li>
                </ul>

                <div class="flex-col gap-2" style="margin-top: 1.5rem;">
                    <span class="site-tagline" style="padding: 0 0.75rem; margin-bottom: 0.25rem;">التصنيفات</span>
                    <ul id="dynamic-nav" class="nav-list">
                        <li class="skeleton" style="height: 32px; width: 100%;"></li>
                        <li class="skeleton" style="height: 32px; width: 100%;"></li>
                        <li class="skeleton" style="height: 32px; width: 100%;"></li>
                    </ul>
                </div>
            </nav>

            <!-- Bottom Actions -->
            <div class="flex-col gap-4"
                style="margin-top: auto; padding-top: 1.5rem; border-top: 1px dashed hsl(var(--border));">
                <div style="font-size: 11px; color: hsl(var(--muted-foreground)); line-height: 1.6;">
                    <p>واجهة ووردبريس مفصولة فائقة الخفّة من <a href="https://hadealahmad.com" target="_blank"
                            style="font-weight: 800; color: hsl(var(--foreground)); text-decoration: underline; text-underline-offset: 4px; text-decoration-color: hsl(var(--primary)/20);">هادي
                            الأحمد</a></p>
                </div>

                <a href="https://github.com/hadealahmad/WPsuperlightUI" target="_blank"
                    class="nav-link active justify-content-center"
                    style="justify-content: center; font-size: 0.8rem; background-color: transparent; border: 1px solid hsl(var(--border));">
                    <i data-lucide="github"></i>
                    <span>حول المشروع</span>
                </a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main id="app" class="main-content">
            <!-- Dynamic Content -->
            <div id="loading" class="flex-col gap-6">
                <div class="skeleton" style="height: 3rem; width: 40%;"></div>
                <div class="flex-col gap-8">
                    <div class="skeleton" style="height: 20rem; width: 100%;"></div>
                    <div class="skeleton" style="height: 20rem; width: 100%;"></div>
                </div>
            </div>
        </main>

    </div>

    <script src="app.js" type="module"></script>
</body>

</html>

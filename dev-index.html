<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="seo-title">هادي الأحمد</title>
    <meta id="seo-description" name="description" content="وحياتي غير المثيرة للاهتمام">


    <!-- Optimized Tailwind CSS -->
    <link rel="stylesheet" href="dist.css">

</head>

<body class="bg-background text-foreground font-sans antialiased min-h-screen">

    <div
        class="max-w-[1400px] mx-auto min-h-screen grid grid-cols-1 md:grid-cols-[280px_1fr] gap-8 md:gap-16 p-4 md:p-10">

        <!-- Sidebar (Sticky on Right in RTL) -->
        <aside
            class="flex flex-col gap-10 md:sticky md:top-10 md:h-[calc(100vh-5rem)] border-b pb-8 md:border-b-0 md:pb-0 md:border-e md:pe-8">

            <!-- Branding -->
            <div class="flex flex-col gap-6">
                <div class="flex items-center gap-4 group cursor-pointer" onclick="window.location.hash='#'">
                    <div>
                        <h1 id="site-title" class="text-xl font-bold tracking-tight"></h1>
                        <span id="site-tagline"
                            class="text-[10px] text-muted-foreground uppercase tracking-widest font-semibold leading-tight block"></span>
                    </div>
                </div>

                <!-- Control Toggles -->
                <div class="flex items-center gap-2">
                    <button id="toggle-minimal"
                        class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-secondary/30 hover:bg-secondary/50 transition-all text-[11px] font-bold border border-transparent hover:border-border">
                        <i data-lucide="image" id="minimal-icon" class="w-3.5 h-3.5 text-muted-foreground"></i>
                        <span>الصور</span>
                    </button>
                    <button id="toggle-dark"
                        class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-secondary/30 hover:bg-secondary/50 transition-all text-[11px] font-bold border border-transparent hover:border-border">
                        <i data-lucide="moon" id="dark-icon" class="w-3.5 h-3.5 text-muted-foreground"></i>
                        <span id="dark-label">ليلي</span>
                    </button>
                    <a href="#settings" id="settings-btn"
                        class="hidden flex items-center justify-center w-8 h-8 rounded-full bg-secondary/30 hover:bg-secondary/50 transition-all border border-transparent hover:border-border">
                        <i data-lucide="settings" class="w-3.5 h-3.5 text-muted-foreground"></i>
                    </a>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="flex-1">
                <ul id="main-nav" class="flex flex-col gap-1.5 text-sm font-medium">
                    <!-- Dynamic Post Types Injected Here -->
                </ul>

                <ul class="flex flex-col gap-1.5 text-sm font-medium mt-4">
                    <li class="px-2.5 py-1.5 text-[10px] font-bold text-muted-foreground uppercase tracking-tight">
                        التصنيفات
                    </li>
                    <div id="dynamic-nav" class="flex flex-col gap-1">
                        <!-- Dynamic Categories Injected Here -->
                    </div>
                </ul>
            </nav>

            <!-- Bottom Actions -->
            <div class="mt-auto flex flex-col gap-4 pt-6 border-t border-dashed">
                <!-- About link moved here -->
                <ul class="flex flex-col gap-1.5 text-sm font-medium">
                    <li>
                        <a href="#about"
                            class="nav-item flex items-center gap-3 p-2.5 rounded-md transition-all hover:bg-accent hover:text-accent-foreground group opacity-70 hover:opacity-100">
                            <i data-lucide="info" class="w-4 h-4 text-muted-foreground group-hover:text-primary"></i>
                            <span>عن الموقع</span>
                        </a>
                    </li>
                </ul>

                <!-- Credits -->
                <div class="text-[10px] text-muted-foreground leading-loose">
                    <p>واجهة ووردبريس مفصولة فائقة الخفّة من <a href="https://hadealahmad.com" target="_blank"
                            class="font-bold text-foreground underline underline-offset-4 decoration-primary/20 hover:decoration-primary">هادي
                            الأحمد</a></p>
                </div>

                <a href="https://github.com/hadealahmad/WPsuperlightUI" target="_blank"
                    class="w-8 h-8 flex items-center justify-center rounded-md border border-border bg-secondary/30 hover:bg-secondary transition-all text-muted-foreground hover:text-foreground">
                    <i data-lucide="github" class="w-4 h-4"></i>
                </a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main id="app" class="max-w-[70ch] overflow-hidden">
            <!-- Dynamic Content (Archive / Single) -->
            <div id="loading" class="animate-pulse space-y-10">
                <div class="h-10 w-1/3 bg-muted rounded"></div>
                <div class="space-y-12">
                    <div class="h-64 bg-muted rounded-xl"></div>
                    <div class="h-64 bg-muted rounded-xl"></div>
                </div>
            </div>
        </main>

    </div>

    <script src="app.js" type="module"></script>
</body>

</html>

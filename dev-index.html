<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="seo-title">هادي الأحمد</title>
    <meta id="seo-description" name="description" content="وحياتي غير المثيرة للاهتمام">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="page-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar">

            <!-- Branding -->
            <div class="flex-col gap-4">
                <div class="flex-center gap-4 cursor-pointer" onclick="window.location.hash='#'"
                    style="justify-content: flex-start;">
                    <div>
                        <h1 id="site-title" class="post-title" style="font-size: 1.25rem; margin-bottom: 0;"></h1>
                        <span id="site-tagline"
                            style="font-size: 10px; color: hsl(var(--muted-foreground)); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; line-height: 1.2; display: block;"></span>
                    </div>
                </div>

                <!-- Control Toggles -->
                <div class="flex-center gap-2" style="justify-content: flex-start;">
                    <button id="toggle-minimal" title="الصور" class="btn-icon">
                        <i data-lucide="image" id="minimal-icon"></i>
                    </button>
                    <button id="toggle-text" title="كامل/بسيط" class="btn-icon">
                        <i data-lucide="file-text" id="text-icon"></i>
                    </button>
                    <button id="toggle-dark" title="الوضع الليلي" class="btn-icon">
                        <i data-lucide="moon" id="dark-icon"></i>
                    </button>
                    <a href="#settings" id="settings-btn" aria-label="الإعدادات" title="الإعدادات" class="btn-icon"
                        style="display: none;">
                        <i data-lucide="settings"></i>
                    </a>
                </div>
            </div>

            <!-- Navigation -->
            <nav style="flex: 1;">
                <ul id="main-nav" class="flex-col gap-2">
                    <!-- Skeletons for main navigation -->
                    <div class="skeleton" style="height: 40px; margin-bottom: 4px;"></div>
                    <div class="skeleton" style="height: 40px; margin-bottom: 4px;"></div>
                </ul>

                <div class="flex-col gap-2" style="margin-top: 1rem;">
                    <span
                        style="padding: 0.4rem 0.6rem; font-size: 10px; font-weight: 700; color: hsl(var(--muted-foreground)); text-transform: uppercase;">
                        التصنيفات
                    </span>
                    <ul id="dynamic-nav" class="flex-col gap-2">
                        <li class="skeleton" style="height: 32px; margin-bottom: 4px;"></li>
                        <li class="skeleton" style="height: 32px; margin-bottom: 4px;"></li>
                        <li class="skeleton" style="height: 32px; margin-bottom: 4px;"></li>
                    </ul>
                </div>
            </nav>

            <!-- Bottom Actions -->
            <div class="flex-col gap-4"
                style="margin-top: auto; padding-top: 1.5rem; border-top: 1px dashed hsl(var(--border));">
                <div style="font-size: 10px; color: hsl(var(--muted-foreground)); line-height: 1.6;">
                    <p>واجهة ووردبريس مفصولة فائقة الخفّة من <a href="https://hadealahmad.com" target="_blank"
                            style="font-weight: 700; color: hsl(var(--foreground)); text-decoration: underline; text-underline-offset: 4px; text-decoration-color: hsl(var(--primary)/20);">هادي
                            الأحمد</a></p>
                </div>

                <a href="https://github.com/hadealahmad/WPsuperlightUI" target="_blank" class="nav-item active"
                    style="justify-content: center; font-size: 0.75rem;">
                    <i data-lucide="github"></i>
                    <span>حول المشروع</span>
                </a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main id="app" class="main-content">
            <!-- Dynamic Content -->
            <div id="loading" class="flex-col gap-4">
                <div class="skeleton" style="height: 2.5rem; width: 33%;"></div>
                <div class="flex-col gap-4">
                    <div class="skeleton" style="height: 16rem;"></div>
                    <div class="skeleton" style="height: 16rem;"></div>
                </div>
            </div>
        </main>

    </div>

    <script src="app.js" type="module"></script>
</body>

</html>
